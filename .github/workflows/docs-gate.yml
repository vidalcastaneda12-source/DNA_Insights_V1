name: docs-gate

# Decision-tracking gate (finding-036 / DEC-0086): run `genome docs check` on every
# push to main and every PR. The gate validates the MEMORY.md decision ledger and
# per-finding frontmatter (CAPTURE / RETRIEVAL / LIFECYCLE); it is DB-free and
# config-free (needs no APP_DB_PASSPHRASE).
#
# This workflow REPORTS pass/fail. To make a failure BLOCK merge, a repo admin must add
# the `docs-check` job as a required status check on `main` (Settings -> Branches ->
# branch protection). Until then it is advisory.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # Skip the two packages that need from-source builds + system libraries absent on
      # the runner: cyvcf2 (htslib/libcurl) and pysqlcipher3 (SQLCipher headers —
      # sqlcipher/sqlite3.h). The gate is DB-free + config-free and `genome.cli` is
      # pysqlcipher3-lazy, so it imports neither; dropping them keeps CI fast and
      # toolchain-free.
      - name: Sync dependencies (without cyvcf2 or pysqlcipher3)
        run: uv sync --no-install-package cyvcf2 --no-install-package pysqlcipher3
      # The gate's non-zero exit fails this step (and the job). No `|| true`, no
      # `continue-on-error` — a swallowed exit would make the gate enforcement theatre.
      - name: Decision-tracking gate (genome docs check)
        run: uv run --no-sync genome docs check
